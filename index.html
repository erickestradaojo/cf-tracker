<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CF Tracker">
  <meta name="mobile-web-app-capable" content="yes">
  <title>CF Tracker · Erick</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      background: #000;
      color: #fff;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    input, textarea, button {
      font-family: inherit;
      font-size: 16px; /* evita zoom en iOS */
    }
    input:focus, textarea:focus { outline: none; }
    button { cursor: pointer; background: none; border: none; color: inherit; }
    button:active { transform: scale(0.97); }
    
    /* Utility classes */
    .hidden { display: none !important; }
    .flex { display: flex; }
    .flex-1 { flex: 1; }
    .grid { display: grid; }
    .gap-1 { gap: 4px; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .items-center { align-items: center; }
    .items-start { align-items: flex-start; }
    .items-baseline { align-items: baseline; }
    .justify-between { justify-content: space-between; }
    .justify-center { justify-content: center; }
    .text-center { text-align: center; }
    .text-left { text-align: left; }
    .w-full { width: 100%; }
    .relative { position: relative; }
    .sticky { position: sticky; top: 0; }
    .fixed { position: fixed; }
    .uppercase { text-transform: uppercase; }
    .italic { font-style: italic; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    .leading-tight { line-height: 1.15; }
    .leading-none { line-height: 1; }
    .leading-relaxed { line-height: 1.6; }
    .tracking-tight { letter-spacing: -0.02em; }
    .tracking-tighter { letter-spacing: -0.04em; }
    .tracking-wider { letter-spacing: 0.05em; }
    .tracking-widest { letter-spacing: 0.15em; }
    .whitespace-pre-wrap { white-space: pre-wrap; }
    .overflow-hidden { overflow: hidden; }
    .overflow-y-auto { overflow-y: auto; -webkit-overflow-scrolling: touch; }
    
    .min-h-screen { min-height: 100vh; min-height: -webkit-fill-available; }
    
    /* Colors */
    .text-white { color: #fff; }
    .text-black { color: #000; }
    .text-red-500 { color: #ef4444; }
    .text-red-600 { color: #dc2626; }
    .text-yellow-400 { color: #facc15; }
    .text-amber-500 { color: #f59e0b; }
    .text-emerald-500 { color: #10b981; }
    .text-zinc-300 { color: #d4d4d8; }
    .text-zinc-400 { color: #a1a1aa; }
    .text-zinc-500 { color: #71717a; }
    .text-zinc-600 { color: #52525b; }
    .text-zinc-700 { color: #3f3f46; }
    
    .bg-black { background: #000; }
    .bg-white { background: #fff; }
    .bg-red-500 { background: #ef4444; }
    .bg-red-600 { background: #dc2626; }
    .bg-red-950 { background: #450a0a; }
    .bg-amber-500 { background: #f59e0b; }
    .bg-amber-950 { background: #451a03; }
    .bg-yellow-400 { background: #facc15; }
    .bg-emerald-500 { background: #10b981; }
    .bg-emerald-600 { background: #059669; }
    .bg-emerald-700 { background: #047857; }
    .bg-emerald-950 { background: #022c22; }
    .bg-blue-500 { background: #3b82f6; }
    .bg-blue-600 { background: #2563eb; }
    .bg-blue-950 { background: #172554; }
    .bg-orange-600 { background: #ea580c; }
    .bg-purple-600 { background: #9333ea; }
    .bg-zinc-700 { background: #3f3f46; }
    .bg-zinc-800 { background: #27272a; }
    .bg-zinc-900 { background: #18181b; }
    .bg-zinc-950 { background: #09090b; }
    
    /* Borders */
    .border { border: 1px solid; }
    .border-2 { border: 2px solid; }
    .border-t { border-top: 1px solid; }
    .border-t-2 { border-top: 2px solid; }
    .border-b { border-bottom: 1px solid; }
    .border-b-2 { border-bottom: 2px solid; }
    .border-zinc-700 { border-color: #3f3f46; }
    .border-zinc-800 { border-color: #27272a; }
    .border-red-500 { border-color: #ef4444; }
    .border-red-600 { border-color: #dc2626; }
    .border-amber-500 { border-color: #f59e0b; }
    .border-yellow-400 { border-color: #facc15; }
    .border-emerald-500 { border-color: #10b981; }
    .border-emerald-700 { border-color: #047857; }
    .border-blue-500 { border-color: #3b82f6; }
    
    /* Spacing */
    .p-1 { padding: 4px; } .p-2 { padding: 8px; } .p-3 { padding: 12px; }
    .p-4 { padding: 16px; } .p-5 { padding: 20px; } .p-6 { padding: 24px; }
    .px-2 { padding-left: 8px; padding-right: 8px; }
    .px-3 { padding-left: 12px; padding-right: 12px; }
    .px-4 { padding-left: 16px; padding-right: 16px; }
    .px-5 { padding-left: 20px; padding-right: 20px; }
    .py-1 { padding-top: 4px; padding-bottom: 4px; }
    .py-1\.5 { padding-top: 6px; padding-bottom: 6px; }
    .py-2 { padding-top: 8px; padding-bottom: 8px; }
    .py-2\.5 { padding-top: 10px; padding-bottom: 10px; }
    .py-3 { padding-top: 12px; padding-bottom: 12px; }
    .py-4 { padding-top: 16px; padding-bottom: 16px; }
    .py-12 { padding-top: 48px; padding-bottom: 48px; }
    .pt-2 { padding-top: 8px; }
    .pt-6 { padding-top: 24px; }
    .pt-12 { padding-top: 48px; }
    .pb-24 { padding-bottom: 96px; }
    .mb-1 { margin-bottom: 4px; }
    .mb-2 { margin-bottom: 8px; }
    .mb-3 { margin-bottom: 12px; }
    .mb-4 { margin-bottom: 16px; }
    .mb-6 { margin-bottom: 24px; }
    .mb-12 { margin-bottom: 48px; }
    .mt-1 { margin-top: 4px; }
    .mt-3 { margin-top: 12px; }
    .mt-12 { margin-top: 48px; }
    .ml-1 { margin-left: 4px; }
    .ml-2 { margin-left: 8px; }
    .ml-auto { margin-left: auto; }
    
    /* Sizes */
    .w-6 { width: 24px; } .h-6 { height: 24px; }
    .w-8 { width: 32px; } .h-8 { height: 32px; }
    .w-9 { width: 36px; } .h-9 { height: 36px; }
    .h-1 { height: 4px; }
    .min-w-0 { min-width: 0; }
    .flex-shrink-0 { flex-shrink: 0; }
    
    /* Typography */
    .text-\[10px\] { font-size: 10px; }
    .text-\[11px\] { font-size: 11px; }
    .text-xs { font-size: 12px; }
    .text-sm { font-size: 14px; }
    .text-base { font-size: 16px; }
    .text-lg { font-size: 18px; }
    .text-xl { font-size: 20px; }
    .text-3xl { font-size: 28px; }
    .text-5xl { font-size: 48px; }
    .text-6xl { font-size: 56px; }
    .font-bold { font-weight: 700; }
    .font-black { font-weight: 900; }
    
    /* Border radius */
    .rounded { border-radius: 4px; }
    .rounded-lg { border-radius: 8px; }
    
    /* Layout */
    .top-0 { top: 0; }
    .bottom-0 { bottom: 0; }
    .left-0 { left: 0; }
    .right-0 { right: 0; }
    .inset-0 { top: 0; bottom: 0; left: 0; right: 0; }
    .z-10 { z-index: 10; }
    .z-20 { z-index: 20; }
    .z-50 { z-index: 50; }
    
    .grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-cols-6 { grid-template-columns: repeat(6, minmax(0, 1fr)); }
    
    .space-y-1 > * + * { margin-top: 4px; }
    .space-y-1\.5 > * + * { margin-top: 6px; }
    .space-y-2 > * + * { margin-top: 8px; }
    .space-y-3 > * + * { margin-top: 12px; }
    .space-y-4 > * + * { margin-top: 16px; }
    
    /* Transitions */
    button, .transition { transition: all 0.15s ease; }
    
    /* Custom */
    .bg-overlay { background: rgba(0,0,0,0.92); backdrop-filter: blur(8px); }
    
    input[type="text"], input[type="number"], textarea {
      background: #18181b;
      border: 2px solid #27272a;
      color: #fff;
      border-radius: 4px;
      padding: 8px 12px;
      width: 100%;
    }
    input:focus, textarea:focus {
      border-color: #facc15;
    }
    textarea { resize: vertical; }
    
    /* SVG icons */
    .icon { width: 1em; height: 1em; display: inline-block; vertical-align: middle; }
    
    /* Animation */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .fade-in { animation: fadeIn 0.2s ease; }
    
    /* iOS install prompt */
    .install-banner {
      position: fixed;
      bottom: 16px;
      left: 16px;
      right: 16px;
      background: #facc15;
      color: #000;
      padding: 12px 16px;
      border-radius: 8px;
      z-index: 100;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;">
      <div style="font-family:monospace;font-weight:900;font-size:48px;color:#DC2626;letter-spacing:-0.04em;">CF</div>
      <div style="font-family:monospace;font-size:12px;color:#52525b;text-transform:uppercase;letter-spacing:0.2em;">Cargando...</div>
    </div>
  </div>
  <script>
    // Desregistrar cualquier SW anterior que pueda estar interfiriendo
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
      });
      // Limpiar todos los cachés viejos
      if (window.caches) {
        caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
      }
    }
  </script>
  <script>
    // Cargar app.js con cache-busting para evitar versiones cacheadas por iOS
    (function() {
      var v = '2.1.' + (new Date().toISOString().slice(0,10).replace(/-/g,''));
      var s = document.createElement('script');
      s.src = 'app.js?v=' + v;
      s.onerror = function() {
        document.getElementById('app').innerHTML = [
          '<div style="display:flex;align-items:center;justify-content:center;',
          'min-height:100vh;flex-direction:column;gap:16px;padding:24px;font-family:monospace;">',
          '<div style="font-size:48px;color:#DC2626;font-weight:900;">CF</div>',
          '<div style="color:#fff;font-weight:900;font-size:16px;">Sin conexión</div>',
          '<div style="color:#71717a;font-size:12px;text-align:center;max-width:260px;line-height:1.6;">',
          'Necesitas internet para abrir la app. Conéctate y vuelve a intentar.</div>',
          '<button onclick="location.reload()" ',
          'style="background:#DC2626;color:#fff;font-family:monospace;font-weight:900;',
          'font-size:12px;padding:14px 28px;border:none;border-radius:4px;',
          'text-transform:uppercase;letter-spacing:0.1em;">',
          'Reintentar</button></div>'
        ].join('');
      };
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
